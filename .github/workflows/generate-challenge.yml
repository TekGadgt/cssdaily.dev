name: Generate Daily Challenge
on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Compute challenge date
        id: date
        run: echo "value=$(date -u -d '+1 day' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate CSS challenge
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-challenge.ts ${{ steps.date.outputs.value }}

      - name: Generate Tailwind challenge
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-tailwind-challenge.ts ${{ steps.date.outputs.value }}

      - name: Commit and push
        env:
          CHALLENGE_DATE: ${{ steps.date.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/challenges/ public/targets/ src/data/tailwind-challenges/ public/targets/tailwind/
          git diff --cached --quiet || (git commit -m "Add daily challenges for $CHALLENGE_DATE" && git push)

      - name: Build Astro site
        run: |
          git pull
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
