name: Generate Daily Challenge
on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate CSS challenge
        id: generate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          OUTPUT=$(npx tsx scripts/generate-challenge.ts)
          echo "$OUTPUT"
          CHALLENGE_DATE=$(echo "$OUTPUT" | grep '^CHALLENGE_DATE=' | cut -d= -f2)
          echo "date=$CHALLENGE_DATE" >> "$GITHUB_OUTPUT"

      - name: Generate Tailwind challenge
        id: generate-tailwind
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          OUTPUT=$(npx tsx scripts/generate-tailwind-challenge.ts)
          echo "$OUTPUT"
          CHALLENGE_DATE=$(echo "$OUTPUT" | grep '^CHALLENGE_DATE=' | cut -d= -f2)
          echo "date=$CHALLENGE_DATE" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/challenges/ public/targets/ src/data/tailwind-challenges/ public/targets/tailwind/
          git diff --cached --quiet || (git commit -m "Add daily challenges for ${{ steps.generate.outputs.date }} ${{ steps.generate-tailwind.outputs.date }}" && git push)

      - name: Build Astro site
        run: |
          git pull
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
