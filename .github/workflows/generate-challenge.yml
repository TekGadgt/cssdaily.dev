name: Generate Daily Challenge
on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Compute challenge date
        id: date
        run: echo "value=$(date -u -d '+1 day' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate CSS challenge
        id: css
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-challenge.ts ${{ steps.date.outputs.value }}

      - name: Generate Tailwind challenge
        id: tailwind
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-tailwind-challenge.ts ${{ steps.date.outputs.value }}

      - name: Report generation results
        env:
          CSS_OUTCOME: ${{ steps.css.outcome }}
          TAILWIND_OUTCOME: ${{ steps.tailwind.outcome }}
          CHALLENGE_DATE: ${{ steps.date.outputs.value }}
        run: |
          echo "## Challenge Generation Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $CHALLENGE_DATE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CSS | $CSS_OUTCOME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tailwind | $TAILWIND_OUTCOME |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CSS_OUTCOME" = "failure" ] && [ "$TAILWIND_OUTCOME" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Both generation steps failed.** Check the logs above for details (common causes: API credits exhausted, rate limit, network error)." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Both CSS and Tailwind challenge generation failed for $CHALLENGE_DATE"
            exit 1
          fi

          if [ "$CSS_OUTCOME" = "failure" ]; then
            echo "::warning::CSS challenge generation failed for $CHALLENGE_DATE"
          fi
          if [ "$TAILWIND_OUTCOME" = "failure" ]; then
            echo "::warning::Tailwind challenge generation failed for $CHALLENGE_DATE"
          fi

      - name: Commit and push
        env:
          CHALLENGE_DATE: ${{ steps.date.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/challenges/ public/targets/ src/data/tailwind-challenges/ public/targets/tailwind/
          git diff --cached --quiet || (git commit -m "Add daily challenges for $CHALLENGE_DATE" && git push)

      - name: Build Astro site
        run: |
          git pull
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
