name: Generate Daily Challenge
on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate challenge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-challenge.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/challenges/ public/targets/
          git diff --cached --quiet || (git commit -m "Add daily challenge for $(date +%Y-%m-%d)" && git push)
